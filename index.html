<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>異世酒館六合彩模擬器</title>
<style>
  :root {
    --gold: #f6c46b;
    --gold-deep: #9d5b19;
    --ink: rgba(8, 7, 10, .74);
    --paper: rgba(255, 244, 220, .88);
    --line: rgba(255, 218, 145, .42);
    --glow: rgba(118, 215, 255, .72);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    font-family: "Noto Serif TC", "Microsoft JhengHei", "PingFang TC", serif;
    color: #fff;
    background: #09070a;
  }

  body {
    min-height: 100vh;
    background-image:
      linear-gradient(180deg, rgba(0,0,0,.16), rgba(0,0,0,.82)),
      url("bg-pattern.png");
    background-size: cover;
    background-position: center top;
    background-attachment: fixed;
    overflow-x: hidden;
  }

  .veil {
    min-height: 100vh;
    padding: 22px 18px 30px;
    background:
      radial-gradient(circle at 50% 48%, rgba(75, 174, 255, .07), transparent 24%),
      radial-gradient(circle at 24% 76%, rgba(255, 216, 114, .07), transparent 28%),
      rgba(0, 0, 0, .04);
    backdrop-filter: saturate(1.03);
  }

  .shell {
    width: min(960px, 100%);
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin: 0 auto 10px;
    text-shadow: 0 2px 10px #000, 0 0 28px var(--glow);
    opacity: .82;
  }

  .eyebrow {
    display: inline-block;
    letter-spacing: .24em;
    font-size: 12px;
    color: #ffe3a1;
    border: 1px solid rgba(255, 218, 145, .25);
    padding: 5px 11px;
    border-radius: 999px;
    background: rgba(0,0,0,.16);
  }

  h1 {
    margin: 12px 0 6px;
    font-size: clamp(26px, 4.2vw, 48px);
    line-height: 1.05;
    font-weight: 800;
    color: rgba(255, 244, 212, .92);
  }

  .sub {
    margin: 0;
    color: rgba(255,255,255,.82);
    font-size: 15px;
  }

  .panel {
    position: relative;
    margin: 54vh auto 0;
    padding: 18px;
    border: 1px solid rgba(255, 218, 145, .24);
    border-radius: 24px;
    background:
      linear-gradient(180deg, rgba(22, 13, 8, .34), rgba(8, 8, 14, .42)),
      linear-gradient(90deg, rgba(255, 200, 93, .055), rgba(92, 200, 255, .07));
    box-shadow:
      0 16px 48px rgba(0,0,0,.38),
      inset 0 0 20px rgba(255, 221, 138, .07),
      0 0 32px rgba(89, 186, 255, .12);
    backdrop-filter: blur(3px) saturate(1.08);
  }

  .control-grid {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 14px;
    align-items: end;
  }

  label {
    display: block;
    font-size: 14px;
    color: #ffe1a4;
    margin-bottom: 8px;
  }

  input[type="number"] {
    width: 100%;
    height: 52px;
    border-radius: 14px;
    border: 1px solid rgba(255, 221, 155, .45);
    background: rgba(255, 252, 238, .92);
    color: #17110d;
    font-size: 22px;
    font-weight: 800;
    text-align: center;
    outline: none;
    box-shadow: inset 0 2px 6px rgba(0,0,0,.15);
  }

  button {
    height: 52px;
    border: 0;
    border-radius: 14px;
    padding: 0 20px;
    color: #251303;
    font-weight: 900;
    font-size: 16px;
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: .08em;
    background:
      linear-gradient(180deg, #fff3bc, var(--gold) 47%, #cb751f 48%, #ffcc69);
    box-shadow:
      0 8px 18px rgba(0,0,0,.38),
      inset 0 2px 0 rgba(255,255,255,.62),
      0 0 20px rgba(255, 210, 92, .25);
  }

  button.secondary {
    background: rgba(255,255,255,.08);
    color: #ffe8b6;
    border: 1px solid var(--line);
    box-shadow: inset 0 0 12px rgba(255,255,255,.05);
  }

  button:active {
    transform: translateY(1px);
  }

  button:disabled {
    cursor: wait;
    opacity: .58;
    filter: grayscale(.25);
  }

  .message {
    min-height: 22px;
    margin: 13px 0 2px;
    color: #ffd28b;
    font-size: 14px;
  }

  .result-card {
    margin-top: 14px;
    padding: 16px 14px;
    border-radius: 20px;
    background:
      radial-gradient(circle at 50% 20%, rgba(116, 215, 255, .12), transparent 58%),
      linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.022));
    border: 1px solid rgba(255,255,255,.09);
  }

  .balls {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
    min-height: 94px;
    align-items: center;
  }

  .ball {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-family: "Arial Rounded MT Bold", "Microsoft JhengHei", sans-serif;
    font-size: 25px;
    font-weight: 900;
    color: #15100d;
    position: relative;
    overflow: visible;
    text-shadow: 0 1px 0 rgba(255,255,255,.82), 0 0 9px rgba(255,255,255,.55);
    animation: bubbleSummon .92s cubic-bezier(.16, .84, .25, 1) both, bubbleFloat 3.2s ease-in-out infinite;
  }

  .ball::before {
    content: "";
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 31% 24%, rgba(255,255,255,.96) 0 9%, rgba(255,255,255,.38) 10% 17%, transparent 19%),
      radial-gradient(circle at 63% 68%, rgba(255,255,255,.18), transparent 34%),
      radial-gradient(circle, rgba(255,255,255,.72) 0 33%, rgba(255,255,255,.28) 52%, rgba(255,255,255,.06) 70%, transparent 100%);
    border: 1px solid rgba(255,255,255,.72);
    box-shadow:
      inset -7px -9px 18px rgba(255,255,255,.20),
      inset 8px 11px 18px rgba(255,255,255,.28),
      0 0 18px rgba(140, 224, 255, .40);
    z-index: 0;
    backdrop-filter: blur(1.5px);
  }

  .ball::after {
    content: "";
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 0%, rgba(255,255,255,.95) 0 2px, transparent 3px),
      radial-gradient(circle at 13% 65%, rgba(255,255,255,.82) 0 2px, transparent 3px),
      radial-gradient(circle at 86% 56%, rgba(255,255,255,.65) 0 1.5px, transparent 3px);
    opacity: .8;
    filter: blur(.1px);
    animation: sparkleSpin 2.9s linear infinite;
    z-index: 0;
  }

  .ball span {
    z-index: 1;
    width: 40px;
    height: 40px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    background: rgba(255, 255, 247, .82);
    box-shadow: inset 0 -2px 8px rgba(0,0,0,.12), 0 0 12px rgba(255,255,255,.36);
  }

  .red {
    background: radial-gradient(circle, rgba(255, 130, 90, .28), rgba(255, 85, 45, .16) 52%, transparent 71%);
    box-shadow: 0 0 30px rgba(255, 106, 54, .56), 0 0 8px rgba(255,255,255,.45);
  }

  .blue {
    background: radial-gradient(circle, rgba(104, 210, 255, .30), rgba(55, 136, 255, .16) 52%, transparent 71%);
    box-shadow: 0 0 30px rgba(93, 190, 255, .58), 0 0 8px rgba(255,255,255,.45);
  }

  .green {
    background: radial-gradient(circle, rgba(150, 255, 150, .30), rgba(57, 185, 68, .16) 52%, transparent 71%);
    box-shadow: 0 0 30px rgba(81, 225, 107, .56), 0 0 8px rgba(255,255,255,.45);
  }

  @keyframes bubbleSummon {
    0% { opacity: 0; transform: translateY(30px) scale(.42); filter: blur(7px); }
    55% { opacity: .72; transform: translateY(-9px) scale(1.12); filter: blur(1px); }
    100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }

  @keyframes bubbleFloat {
    0%, 100% { translate: 0 0; }
    50% { translate: 0 -5px; }
  }

  @keyframes sparkleSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .readout {
    margin-top: 16px;
    text-align: center;
    font-size: 20px;
    color: #fff1c7;
    letter-spacing: .05em;
    word-break: break-word;
  }

  .history {
    margin-top: 16px;
    padding-top: 13px;
    border-top: 1px dashed rgba(255, 221, 145, .20);
  }

  .history-title {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    margin-bottom: 10px;
    color: #ffe2a0;
    font-size: 14px;
  }

  .history-list {
    display: grid;
    gap: 8px;
    max-height: 190px;
    overflow: auto;
    padding-right: 4px;
  }

  .history-row {
    display: grid;
    grid-template-columns: 78px 1fr;
    gap: 10px;
    padding: 9px 11px;
    border-radius: 12px;
    background: rgba(0,0,0,.16);
    color: rgba(255,255,255,.86);
    font-size: 14px;
  }

  .muted {
    color: rgba(255,255,255,.64);
  }

  footer {
    width: min(960px, 100%);
    margin: 14px auto 0;
    color: rgba(255,255,255,.62);
    font-size: 12px;
    line-height: 1.65;
    text-align: center;
    text-shadow: 0 2px 8px #000;
  }

  .prize-analysis {
    margin-top: 20px;
    padding: 18px;
    border-radius: 20px;
    background: linear-gradient(180deg, rgba(30, 20, 10, .55), rgba(15, 10, 25, .45));
    border: 1px solid rgba(255, 200, 93, .18);
  }

  .prize-analysis h3 {
    margin: 0 0 14px 0;
    color: #ffe8b0;
    font-size: 17px;
    letter-spacing: .08em;
  }

  .prize-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .stat-box {
    background: rgba(0,0,0,.25);
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid rgba(255, 221, 145, .12);
  }

  .stat-label {
    font-size: 12px;
    color: #ffc977;
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 20px;
    font-weight: 800;
    color: #fff;
  }

  .prize-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }

  .prize-table th, .prize-table td {
    padding: 9px 8px;
    text-align: left;
    border-bottom: 1px solid rgba(255, 221, 145, .12);
  }

  .prize-table th {
    color: #ffe8b0;
    font-weight: 700;
    background: rgba(255, 200, 93, .08);
  }

  .prize-table .prob {
    color: #7ee3ff;
    font-family: monospace;
  }

  .prize-table .prize {
    color: #ffd700;
    font-weight: 700;
  }

  .prize-note {
    margin-top: 12px;
    font-size: 11.5px;
    color: rgba(255,255,255,.55);
    line-height: 1.5;
  }

  .version {
    position: fixed;
    bottom: 8px;
    right: 12px;
    font-size: 10px;
    color: rgba(255,255,255,.35);
    z-index: 9999;
  }
</style>
</head>
<body>
  <main class="veil">
    <section class="shell">
      <header>
        <div class="eyebrow">LUNATIC DAWN NUMBER ORACLE</div>
        <h1>異世酒館六合彩模擬器</h1>
        <p class="sub">輸入要抽出的號碼數量，系統會從 1 至 49 之間抽出不重複號碼。</p>
      </header>

      <section class="panel" aria-label="六合彩模擬器">
        <!-- 控制區 -->
        <div class="control-grid">
          <div>
            <label for="count">要輸出多少個號碼</label>
            <input id="count" type="number" min="1" max="49" value="7" inputmode="numeric">
          </div>
          <button id="drawBtn" type="button">開始占卜</button>
          <button id="copyBtn" class="secondary" type="button">複製結果</button>
        </div>

        <div id="message" class="message">預設輸出 7 個號碼；可輸入 1 至 49。</div>

        <!-- 結果顯示區 -->
        <div class="result-card">
          <div id="apocalypse" class="apocalypse hidden" aria-live="polite" aria-hidden="true">
            <div class="portal">
              <div class="sigil sigil-a"></div>
              <div class="sigil sigil-b"></div>
              <div class="sigil sigil-c"></div>
              <div class="beam"></div>
              <div class="runes">四九星盤・月曉啟示・號運凝形</div>
            </div>
            <div class="apocalypse-text">天啟正在展開</div>
          </div>
          <div id="balls" class="balls" aria-live="polite"></div>
          <div id="readout" class="readout muted">尚未抽號</div>
        </div>

        <!-- 複式投注分析（重點） -->
        <div class="prize-analysis">
          <h3>🎯 複式投注分析（以目前抽出的號碼）</h3>
          
          <div style="margin-bottom: 12px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap;">
            <div>
              <span style="color:#ffe8b0; font-size:13px;">未開獎期數：</span>
              <input id="draw-period" type="text" value="2026-052" style="width:90px; background:rgba(255,255,255,.1); border:1px solid rgba(255,221,145,.3); color:#fff; padding:4px 8px; border-radius:6px; font-size:13px;">
            </div>
            <div>
              <span style="color:#ffe8b0; font-size:13px;">當期金多寶：</span>
              <input id="snowball" type="text" value="8,500,000" style="width:110px; background:rgba(255,255,255,.1); border:1px solid rgba(255,221,145,.3); color:#ffd700; padding:4px 8px; border-radius:6px; font-size:13px; font-weight:700;">
            </div>
          </div>

          <div id="prize-content">
            <div style="color:#ffd28b; font-size:14px; padding:12px;">請先進行占卜，系統將自動計算複式投注詳情。</div>
          </div>
        </div>

        <!-- 歷史紀錄 -->
        <div class="history">
          <div class="history-title">
            <span>最近紀錄</span>
            <button id="clearBtn" class="secondary" type="button" style="height:34px;padding:0 12px;font-size:12px;">清除紀錄</button>
          </div>
          <div id="historyList" class="history-list">
            <div class="muted">暫無紀錄。</div>
          </div>
        </div>
      </section>
    </section>

    <footer>
      此頁只作隨機模擬與介面展示，不構成投注建議，亦不具預測中獎能力。<br>
      隨機抽號採用瀏覽器 Crypto API；每次抽出的號碼不重複，並按由小至大排列。
    </footer>
  </main>

  <div class="version">v1.5 • 2026.05.02</div>
  <script>
(() => {
  "use strict";

  const redSet = new Set([1,2,7,8,12,13,18,19,23,24,29,30,34,35,40,45,46]);
  const blueSet = new Set([3,4,9,10,14,15,20,25,26,31,36,37,41,42,47,48]);

  const countInput = document.getElementById("count");
  const drawBtn = document.getElementById("drawBtn");
  const copyBtn = document.getElementById("copyBtn");
  const clearBtn = document.getElementById("clearBtn");
  const ballsEl = document.getElementById("balls");
  const apocalypseEl = document.getElementById("apocalypse");
  const readoutEl = document.getElementById("readout");
  const messageEl = document.getElementById("message");
  const historyList = document.getElementById("historyList");
  const prizeContent = document.getElementById("prize-content");

  let latest = [];
  let history = [];

  function pad(n) {
    return String(n).padStart(2, "0");
  }

  function colourClass(n) {
    if (redSet.has(n)) return "red";
    if (blueSet.has(n)) return "blue";
    return "green";
  }

  function secureRandomInt(maxExclusive) {
    if (!Number.isInteger(maxExclusive) || maxExclusive <= 0) {
      throw new RangeError("maxExclusive must be a positive integer.");
    }
    const bucket = new Uint32Array(1);
    const maxUint = 0x100000000;
    const limit = maxUint - (maxUint % maxExclusive);
    do {
      window.crypto.getRandomValues(bucket);
    } while (bucket[0] >= limit);
    return bucket[0] % maxExclusive;
  }

  function drawNumbers(count) {
    const pool = Array.from({ length: 49 }, (_, i) => i + 1);
    for (let i = pool.length - 1; i > 0; i--) {
      const j = secureRandomInt(i + 1);
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    return pool.slice(0, count).sort((a, b) => a - b);
  }

  function binom(n, k) {
    if (k < 0 || k > n) return 0;
    let res = 1;
    for (let i = 0; i < k; i++) {
      res *= (n - i);
      res /= (i + 1);
    }
    return Math.round(res);
  }

  function wait(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  async function runApocalypse(count) {
    ballsEl.innerHTML = "";
    apocalypseEl.classList.remove("hidden", "closing");
    apocalypseEl.setAttribute("aria-hidden", "false");
    readoutEl.classList.add("muted");
    readoutEl.textContent = "天啟未竟，號碼尚未凝形……";

    const phases = [
      "星盤展開：正在校準四十九道符文……",
      "月曉啟示：正在擾動命數之池……",
      "天啟完成：魔法泡泡即將凝成……"
    ];

    for (const phase of phases) {
      messageEl.textContent = phase;
      await wait(900);
    }

    await wait(300);
    apocalypseEl.classList.add("closing");
    await wait(450);
    apocalypseEl.classList.add("hidden");
    apocalypseEl.setAttribute("aria-hidden", "true");
    messageEl.textContent = `天啟完成，正在逐一凝成 ${count} 個魔法泡泡……`;
  }

  async function renderBalls(numbers) {
    ballsEl.innerHTML = "";
    readoutEl.classList.add("muted");
    readoutEl.textContent = "魔法泡泡正在緩慢凝成號碼……";

    for (const [index, n] of numbers.entries()) {
      const ball = document.createElement("div");
      ball.className = `ball ${colourClass(n)}`;
      ball.style.animationDelay = `${(index % 4) * 120}ms, ${index * 160}ms`;
      ball.innerHTML = `<i class="ring ring-one"></i><i class="ring ring-two"></i><span>${pad(n)}</span>`;
      ballsEl.appendChild(ball);
      await wait(650);
    }

    readoutEl.classList.remove("muted");
    readoutEl.textContent = numbers.map(pad).join("　");
  }

  function renderPrizeAnalysis(numbers) {
    if (!prizeContent) return;

    prizeContent.innerHTML = `<div style="color:#ffd28b; padding:12px; text-align:center;">載入中...</div>`;

    setTimeout(() => {
      try {
        if (!numbers || numbers.length < 6) {
          prizeContent.innerHTML = `<div style="color:#ffd28b; font-size:14px; padding:12px;">請先進行占卜（至少 6 個號碼）。</div>`;
          return;
        }

        const K = numbers.length;
        const totalBets = binom(K, 6);
        const unit = 10;
        const totalCost = totalBets * unit;

        const p1 = binom(K, 6) / binom(49, 6);
        const p3 = (binom(K, 5) * (49 - K)) / binom(49, 6);

        const est1 = 12000000;
        const est2 = 650000;
        const est3 = 45000;

        const win1 = (p1 * 100).toFixed(5);
        const win3 = (p3 * 100).toFixed(4);
        const totalPrize3 = Math.round(est3 * (binom(K, 5) * (49 - K)));

        prizeContent.innerHTML = `
          <div class="prize-stats">
            <div class="stat-box">
              <div class="stat-label">複式注數</div>
              <div class="stat-value">${totalBets.toLocaleString()} 注</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">總投注金額</div>
              <div class="stat-value">HK$${totalCost.toLocaleString()}</div>
            </div>
          </div>

          <table class="prize-table">
            <thead>
              <tr>
                <th>獎項</th>
                <th>中獎條件</th>
                <th>中獎機率</th>
                <th>預估每注彩金</th>
                <th>總彩金</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td><strong>頭獎</strong></td>
                <td>6 個全中</td>
                <td class="prob">${win1}%</td>
                <td class="prize">HK$${est1.toLocaleString()}</td>
                <td class="prize">HK$${est1.toLocaleString()}</td>
              </tr>
              <tr>
                <td><strong>二獎</strong></td>
                <td>5 + 特別號</td>
                <td class="prob">≈ 0.0008%</td>
                <td class="prize">HK$${est2.toLocaleString()}</td>
                <td class="prize">≈ HK$${(est2 * 2).toLocaleString()}</td>
              </tr>
              <tr>
                <td><strong>三獎</strong></td>
                <td>5 個正確</td>
                <td class="prob">${win3}%</td>
                <td class="prize">HK$${est3.toLocaleString()}</td>
                <td class="prize">HK$${totalPrize3.toLocaleString()}</td>
              </tr>
            </tbody>
          </table>

          <div class="prize-note">
            ※ 彩金為 2026 年平均參考值，實際金額視每期彩池而定（頭獎可高達數千萬）。<br>
            ※ 複式投注只會產生 1 個頭獎中獎組合。
          </div>
        `;
      } catch (e) {
        prizeContent.innerHTML = `<div style="color:#ff6b6b; padding:12px;">計算時發生錯誤，請重新占卜。</div>`;
        console.error("Prize analysis error:", e);
      }
    }, 250);
  }

  function renderHistory() {
    historyList.innerHTML = "";
    if (history.length === 0) {
      const empty = document.createElement("div");
      empty.className = "muted";
      empty.textContent = "暫無紀錄。";
      historyList.appendChild(empty);
      return;
    }

    history.forEach((item, idx) => {
      const row = document.createElement("div");
      row.className = "history-row";
      row.innerHTML = `
        <div class="muted">第 ${history.length - idx} 次</div>
        <div>${item.map(pad).join("、")}</div>
      `;
      historyList.appendChild(row);
    });
  }

  function validateCount() {
    const raw = Number(countInput.value);
    if (!Number.isInteger(raw) || raw < 1 || raw > 49) {
      messageEl.textContent = "請輸入 1 至 49 之間的整數。";
      return null;
    }
    return raw;
  }

  async function runDraw() {
    const count = validateCount();
    if (count === null || drawBtn.disabled) return;

    drawBtn.disabled = true;
    copyBtn.disabled = true;
    messageEl.textContent = `正在從 49 個號碼中召喚 ${count} 個魔法泡泡……`;

    latest = drawNumbers(count);
    await runApocalypse(count);
    await renderBalls(latest);
    renderPrizeAnalysis(latest);

    history.unshift(latest);
    history = history.slice(0, 10);
    renderHistory();

    messageEl.textContent = `已從 49 個號碼中抽出 ${count} 個不重複號碼。`;
    drawBtn.disabled = false;
    copyBtn.disabled = false;
  }

  async function copyResult() {
    if (latest.length === 0) {
      messageEl.textContent = "目前未有可複製的結果，請先開始占卜。";
      return;
    }
    const text = latest.map(pad).join(", ");
    try {
      await navigator.clipboard.writeText(text);
      messageEl.textContent = "結果已複製到剪貼簿。";
    } catch (err) {
      messageEl.textContent = "瀏覽器未允許直接複製；請手動選取結果文字。";
    }
  }

  // 初始化
  drawBtn.addEventListener("click", runDraw);
  copyBtn.addEventListener("click", copyResult);
  clearBtn.addEventListener("click", () => {
    history = [];
    latest = [];
    ballsEl.innerHTML = "";
    apocalypseEl.classList.add("hidden");
    readoutEl.classList.add("muted");
    readoutEl.textContent = "尚未抽號";
    prizeContent.innerHTML = `<div style="color:#ffd28b; font-size:14px; padding:12px;">請先進行占卜，系統將自動計算複式投注詳情。</div>`;
    messageEl.textContent = "紀錄已清除。";
    drawBtn.disabled = false;
    copyBtn.disabled = false;
    renderHistory();
  });

  countInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") runDraw();
  });

  // 載入 data.json
  async function loadLotteryData() {
    try {
      const response = await fetch('data.json');
      const data = await response.json();
      const periodInput = document.getElementById('draw-period');
      const snowballInput = document.getElementById('snowball');
      if (periodInput) periodInput.value = data.period || '2026-052';
      if (snowballInput) snowballInput.value = data.snowball || '8500000';
    } catch (error) {
      console.log('無法載入 data.json，使用預設值');
    }
  }

  window.addEventListener('load', loadLotteryData);
  renderHistory();
})();
</script>
